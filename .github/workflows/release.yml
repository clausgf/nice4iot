name: Release image

# Build and publish the container image to GHCR on every version tag.
# Tag a green `main` commit to trigger a release:
#
#   git tag v0.11.4 && git push --tags
#
# The image lands at ghcr.io/<owner>/nice4iot, tagged with the full version
# (0.11.4), the major.minor (0.11), and `latest`. It always includes the epaper
# extension (nicepaper). Deploy it with deploy/compose-ghcr.yml.
on:
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # push to GHCR under the repository owner

    steps:
      - uses: actions/checkout@v5

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags and labels
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          # Build context is the repository root; the Dockerfile lives in deploy/
          # and COPYs app/, README.md, LICENSE from that root.
          context: .
          file: deploy/Dockerfile
          push: true
          # The published image ships with the epaper extension baked in.
          build-args: |
            INSTALL_EXTRAS=--extra epaper
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
