networks:
  loki:
    name: loki
    external: true
  caddy_network:
    name: caddy_network
    external: true
services:
  nicegui:
    networks:
      - loki
      - caddy_network
    volumes:
      - ./app:/home/iot/app # mounting local app directory
      - ./data:/home/iot/data
    build: 
      context: .
      args:
        - PUID=1003 # change this to your user id
        - PGID=1003 # change this to your group id
    environment:
      - NICEGUI_STORAGE_SECRET=change-this-to-your-own-private-secret
