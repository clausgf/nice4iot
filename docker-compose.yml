services:
  nicegui:
    image: zauberzeug/nicegui:latest
    command: uvicorn main:app --reload --log-level debug --host 0.0.0.0 --port 8080
    ports:
      - 8080:8080
    volumes:
      - ./app:/app # mounting local app directory
    environment:
      - PUID=1000 # change this to your user id
      - PGID=1000 # change this to your group id
      - NICEGUI_STORAGE_SECRET="change-this-to-yor-own-private-secret"
