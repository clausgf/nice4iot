<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="1024" height="1024">
  <g fill="none" stroke="#2E9F6B" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Globe outline -->
    <circle cx="128" cy="96" r="48"/>
    <!-- Parallels -->
    <ellipse cx="128" cy="96" rx="48" ry="16"/>
    <ellipse cx="128" cy="96" rx="48" ry="32"/>
    <!-- Meridians -->
    <ellipse cx="128" cy="96" rx="16" ry="48"/>
    <ellipse cx="128" cy="96" rx="32" ry="48"/>
    <!-- Spokes to outer nodes -->
    <line x1="176" y1="96" x2="192" y2="96"/>
    <line x1="152" y1="54.4" x2="160" y2="40.6"/>
    <line x1="104" y1="54.4" x2="96" y2="40.6"/>
    <line x1="80"  y1="96" x2="64"  y2="96"/>
    <line x1="104" y1="137.6" x2="96" y2="151.4"/>
    <line x1="152" y1="137.6" x2="160" y2="151.4"/>
    <!-- Nodes -->
    <circle cx="192" cy="96" r="6"/>
    <circle cx="160" cy="40.6" r="6"/>
    <circle cx="96"  cy="40.6" r="6"/>
    <circle cx="64"  cy="96" r="6"/>
    <circle cx="96"  cy="151.4" r="6"/>
    <circle cx="160" cy="151.4" r="6"/>
  </g>
  <!-- Wordmark -->
  <g fill="#0D2B3E">
    <text x="128" y="210" font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif" font-size="56" font-weight="700" text-anchor="middle" letter-spacing="1">
      4IoT
    </text>
  </g>
</svg>
