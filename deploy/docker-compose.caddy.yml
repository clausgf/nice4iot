# Scenario 2 — behind Caddy, served under the /iot sub-path.
#
# Caddy listens on :80 and reverse-proxies /iot/* to nice4iot. nice4iot runs
# with `--root-path /iot` so NiceGUI generates correct /iot-prefixed URLs and
# WebSocket endpoints. Reach it at http://<host>/iot/.
#
#   docker compose -f docker-compose.caddy.yml up -d --build
services:
  nice4iot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        PUID: "1000"
        PGID: "1000"
    # Override the image default to advertise the public sub-path.
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--root-path", "/iot"]
    volumes:
      - ./data:/home/iot/data
    environment:
      NICEGUI_STORAGE_SECRET: "change-this-to-a-long-random-secret"
    expose:
      - "8080"          # internal only; Caddy is the public entrypoint
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - nice4iot
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
