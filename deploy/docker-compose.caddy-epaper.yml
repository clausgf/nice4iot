# Scenario 3 — behind Caddy under /iot, WITH the epaper extension.
#
# Same as docker-compose.caddy.yml, but the image is built with the `epaper`
# extra, which pulls in nicepaper (https://github.com/clausgf/nicepaper) —
# a public source, so no credentials are needed:
#
#   docker compose -f docker-compose.caddy-epaper.yml up -d --build
#
# The extension registers itself automatically once installed; enable it per
# project under Project → General → Extensions.
services:
  nice4iot:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        PUID: "1000"
        PGID: "1000"
        INSTALL_EXTRAS: "--extra epaper"
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8080", "--root-path", "/iot"]
    volumes:
      - ./data:/home/iot/data
    environment:
      NICEGUI_STORAGE_SECRET: "change-this-to-a-long-random-secret"
    expose:
      - "8080"
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      - nice4iot
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
